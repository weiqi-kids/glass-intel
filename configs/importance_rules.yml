# 玻璃供應鏈 - 重要性評分規則

# 基礎分數為 0.5，加上各規則分數，上限 1.0
rules:
- name: 多公司提及
  condition: entities.companies.length > 1
  score: 0.2
  description: 新聞同時提及多家公司，通常代表產業事件
- name: 涉及玻璃價格
  condition: '''glass_price'' in topics'
  score: 0.25
  description: 玻璃價格變動直接影響營收
- name: 涉及光伏玻璃需求
  condition: '''solar_glass_demand'' in topics'
  score: 0.3
  description: 光伏玻璃是成長最快的玻璃應用
- name: 涉及財報
  condition: '''earnings'' in topics'
  score: 0.25
  description: 財報是重要的資訊揭露
- name: 情緒極端
  condition: abs(sentiment.score) > 0.7
  score: 0.15
  description: 極端情緒通常代表重大事件
- name: 供應鏈上下游同時提及
  condition: has_upstream_downstream_mention
  score: 0.2
  description: 供應鏈連動通常是重要訊號
- name: 涉及產能
  condition: '''capacity'' in topics or ''capex'' in topics'
  score: 0.15
  description: 產能變動影響供需平衡
- name: 涉及建築活動
  condition: '''construction_activity'' in topics'
  score: 0.2
  description: 建築業是平板玻璃最大需求來源
- name: 涉及汽車玻璃趨勢
  condition: '''auto_glass_trends'' in topics'
  score: 0.15
  description: 汽車玻璃是高附加價值的應用領域
- name: 涉及玻纖電子
  condition: '''glass_fiber_electronics'' in topics'
  score: 0.15
  description: 玻纖在電子和複合材料中的應用
